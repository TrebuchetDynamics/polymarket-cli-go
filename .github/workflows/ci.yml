name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Format Go files
        run: |
          tmp="$(mktemp)"
          git ls-files -z '*.go' ':!:opensource-projects/**' > "$tmp"
          if [ -s "$tmp" ]; then
            xargs -0 gofmt -w < "$tmp"
          fi
          rm "$tmp"
      - run: git diff --exit-code
      - run: go vet ./...
      - run: go test ./...
